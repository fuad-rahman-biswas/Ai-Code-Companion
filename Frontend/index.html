<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Study Companion — Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/Frontend/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <div class="panel">
      <div class="d-flex align-items-center mb-3">
        <h3 class="me-auto mb-0">AI Study Companion (Demo)</h3>
        <small class="muted">Upload → Summarize → Ask → Quiz</small>
      </div>

      <!-- Nav tabs -->
      <ul class="nav nav-tabs" id="mainTabs" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#summary" type="button">Summary</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#ask" type="button">Ask</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#quiz" type="button">Quiz</button>
        </li>
      </ul>

      <div class="tab-content mt-3">
        <!-- Summary tab -->
        <div class="tab-pane fade show active" id="summary">
          <div class="mb-3">
            <label class="form-label">Upload PDF / TXT</label>
            <input id="fileInput" class="form-control" type="file" accept=".pdf,.txt" />
          </div>
          <div class="d-flex gap-2 mb-3">
            <button id="uploadBtn" class="btn btn-primary">Upload & Summarize</button>
            <button id="clearBtn" class="btn btn-outline-secondary">Clear</button>
          </div>
          <div id="summaryArea" class="mt-2">
            <h5>Summary</h5>
            <div id="summaryContent" class="summary-box"></div>
          </div>
        </div>

        <!-- Ask tab -->
        <div class="tab-pane fade" id="ask">
          <div class="d-flex flex-column">
            <div id="chatArea" class="chat-box"></div>
            <div class="input-group mt-3">
              <input id="questionInput" class="form-control" placeholder="Ask a question about the uploaded notes..." />
              <button id="askBtn" class="btn btn-success">Ask</button>
            </div>
          </div>
        </div>

        <!-- Quiz tab -->
        <div class="tab-pane fade" id="quiz">
          <div class="mb-3">
            <button id="genQuizBtn" class="btn btn-warning">Generate Quiz (5 Qs)</button>
            <button id="gradeBtn" class="btn btn-outline-secondary ms-2">Grade</button>
          </div>
          <div id="quizArea" class="quiz-box">
            <div id="quizList"></div>
            <div id="quizResult" class="mt-2"></div>
          </div>
        </div>
      </div>

      <div class="mt-3 text-muted small">
        Demo frontend • Replace API endpoints with your backend
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/Frontend/app.js"></script>
</body>
</html>
