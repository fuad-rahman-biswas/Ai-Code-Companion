<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Study Companion — Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    .app-shell {
      width: 100%;
      max-width: 950px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      animation: fadeIn 0.6s ease-in-out;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(15px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .nav-tabs {
      border: none;
      margin-bottom: 20px;
    }

    .nav-tabs .nav-link {
      border: none;
      color: #fff;
      font-weight: 500;
      background: transparent;
      transition: all 0.3s ease;
    }

    .nav-tabs .nav-link.active {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
    }

    .summary-box, .chat-box, .quiz-box {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 15px;
      min-height: 120px;
      color: #fff;
      font-size: 0.95rem;
      overflow-y: auto;
    }

    .btn {
      border-radius: 8px;
      font-weight: 500;
      transition: transform 0.15s ease;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .form-control {
      border-radius: 8px;
      border: none;
    }

    .form-control:focus {
      box-shadow: 0 0 0 0.2rem rgba(255,255,255,0.4);
    }

    .small-muted {
      font-size: 0.85rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="panel">
      <!-- Header -->
      <div class="d-flex align-items-center mb-4">
        <h3 class="me-auto mb-0">📚 AI Study Companion</h3>
        <span class="small-muted">Upload → Summarize → Ask → Quiz</span>
      </div>

      <!-- Tabs -->
      <ul class="nav nav-tabs" id="mainTabs" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#summary" type="button">
            📄 Summary
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#ask" type="button">
            💬 Ask
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#quiz" type="button">
            📝 Quiz
          </button>
        </li>
      </ul>

      <div class="tab-content mt-4">
        <!-- Summary tab -->
        <div class="tab-pane fade show active" id="summary">
          <div class="mb-3">
            <label class="form-label fw-semibold">Upload PDF / TXT</label>
            <input id="fileInput" class="form-control" type="file" accept=".pdf,.txt" />
          </div>
          <div class="d-flex gap-2 mb-3">
            <button id="uploadBtn" class="btn btn-light text-dark">⬆️ Upload & Summarize</button>
            <button id="clearBtn" class="btn btn-outline-light">❌ Clear</button>
          </div>
          <div id="summaryArea" class="mt-3">
            <h5 class="fw-semibold">Summary</h5>
            <div id="summaryContent" class="summary-box small-muted">No summary yet...</div>
          </div>
        </div>

        <!-- Ask tab -->
        <div class="tab-pane fade" id="ask">
          <div class="d-flex flex-column">
            <div id="chatArea" class="chat-box small-muted">Start by asking a question...</div>
            <div class="input-group mt-3">
              <input id="questionInput" class="form-control" placeholder="Ask about the uploaded notes..." />
              <button id="askBtn" class="btn btn-success">Ask</button>
            </div>
          </div>
        </div>

        <!-- Quiz tab -->
        <div class="tab-pane fade" id="quiz">
          <div class="mb-3">
            <button id="genQuizBtn" class="btn btn-warning">Generate Quiz (5 Qs)</button>
            <button id="gradeBtn" class="btn btn-outline-light ms-2">Grade</button>
          </div>
          <div id="quizArea" class="quiz-box">
            <div id="quizList" class="mb-2 small-muted">Click "Generate Quiz" to begin.</div>
            <div id="quizResult" class="mt-2 fw-semibold"></div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="mt-4 text-center small-muted">
        Demo frontend • Replace API endpoints with your backend
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/Frontend/app.js"></script>
</body>
</html>
